name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Type-check
        run: npx tsc -b

      - name: Build
        run: npm run build
        env:
          # project sites are served from https://<user>.github.io/<repo>/ — Vite's `base`
          # (vite.config.ts) and React Router's basename (src/App.tsx) both read this.
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: SPA fallback for client-side routing
        # GitHub Pages has no server-side rewrites, so a direct link to e.g. /about would 404.
        # Serving the same app shell as 404.html lets React Router take over client-side.
        run: cp dist/index.html dist/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
